name: Harness gates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  amaze-harness:
    name: AMAZE harness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Allow GitHub Cargo dependencies
        run: |
          git config --global url."https://x-access-token:${{ secrets.MDPATH_TOKEN || secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Format check
        run: cargo fmt --manifest-path tools/amaze-harness/Cargo.toml -- --check

      - name: Test harness
        run: cargo test --quiet --manifest-path tools/amaze-harness/Cargo.toml

      - name: Lint room packs
        run: cargo run --quiet --manifest-path tools/amaze-harness/Cargo.toml -- lint --rooms rooms

      - name: Check room packs
        run: |
          for room in rooms/*; do
            [ -d "$room" ] || continue
            [ "$(basename "$room")" != "TEMPLATE" ] || continue
            [ -f "$room/BUILD.md" ] || continue
            cargo run --quiet --manifest-path tools/amaze-harness/Cargo.toml -- check --room "$room"
          done

      - name: Score portfolio
        run: cargo run --quiet --manifest-path tools/amaze-harness/Cargo.toml -- score --rooms rooms
